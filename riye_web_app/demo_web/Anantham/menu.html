<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anandham Restaurant - Digital Menu</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: linear-gradient(135deg, #1a3a1a 0%, #2d4a2d 50%, #1a3a1a 100%);
            background-attachment: fixed;
            color: #f0f0f0;
            line-height: 1.6;
            font-family: 'Poppins', sans-serif;
            min-height: 100vh;
            position: relative;
        }
        
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: url('https://images.unsplash.com/photo-1517248135467-4c7edcad34c4?auto=format&fit=crop&w=2000&q=80') center/cover;
            opacity: 0.05;
            z-index: -1;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
            position: relative;
            z-index: 1;
        }
        
        header {
            text-align: center;
            padding: 40px 0;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            margin-bottom: 30px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }
        
        .logo {
            font-size: 4rem;
            color: #ffd166;
            margin-bottom: 10px;
            text-shadow: 3px 3px 6px rgba(0, 0, 0, 0.5);
            font-family: 'Playfair Display', serif;
            letter-spacing: 2px;
            position: relative;
            display: inline-block;
        }
        
        .logo::after {
            content: "";
            position: absolute;
            bottom: -10px;
            left: 50%;
            transform: translateX(-50%);
            width: 80%;
            height: 3px;
            background: linear-gradient(90deg, transparent, #9acd32, transparent);
        }
        
        .tagline {
            font-size: 1.3rem;
            color: #9acd32;
            font-style: italic;
            font-weight: 300;
            margin-top: 15px;
            letter-spacing: 1px;
        }
        
        .menu-controls {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            margin-bottom: 40px;
        }
        
        .search-container {
            display: flex;
            width: 100%;
            max-width: 500px;
            margin-bottom: 10px;
            position: relative;
        }
        
        .search-input {
            flex: 1;
            padding: 15px 25px;
            border: 2px solid rgba(154, 205, 50, 0.3);
            border-radius: 50px 0 0 50px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(5px);
            color: #f0f0f0;
            font-size: 1rem;
            outline: none;
            transition: all 0.3s ease;
            font-weight: 500;
        }
        
        .search-input:focus {
            border-color: #9acd32;
            box-shadow: 0 0 0 3px rgba(154, 205, 50, 0.2);
        }
        
        .search-input::placeholder {
            color: #aaa;
            font-style: italic;
        }
        
        .search-btn {
            background: #4caf50;
            color: white;
            border: none;
            padding: 15px 25px;
            border-radius: 0 50px 50px 0;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s ease;
            font-size: 1.1rem;
            box-shadow: 0 4px 10px rgba(76, 175, 80, 0.3);
        }
        
        .search-btn:hover {
            background: #9acd32;
            transform: translateY(-2px);
            box-shadow: 0 6px 15px rgba(154, 205, 50, 0.4);
        }
        
        .filter-buttons {
            display: flex;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap;
        }
        
        .filter-btn {
            background: rgba(76, 175, 80, 0.8);
            color: white;
            border: 2px solid transparent;
            padding: 12px 25px;
            border-radius: 50px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
            font-size: 1rem;
            position: relative;
            overflow: hidden;
            z-index: 1;
        }
        
        .filter-btn::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 0;
            height: 100%;
            background: #9acd32;
            transition: width 0.3s ease;
            z-index: -1;
        }
        
        .filter-btn:hover::before, .filter-btn.active::before {
            width: 100%;
        }
        
        .filter-btn:hover, .filter-btn.active {
            color: #333;
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(154, 205, 50, 0.4);
        }
        
        .menu-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 30px;
        }
        
        .menu-card {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(15px);
            border-radius: 20px;
            overflow: hidden;
            transition: all 0.4s ease;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            position: relative;
        }
        
        .menu-card::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, rgba(76, 175, 80, 0.1), rgba(154, 205, 50, 0.1));
            opacity: 0;
            transition: opacity 0.3s ease;
            z-index: 0;
        }
        
        .menu-card:hover::before {
            opacity: 1;
        }
        
        .menu-card:hover {
            transform: translateY(-12px);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
        }
        
        .card-image {
            height: 220px;
            background-size: cover;
            background-position: center;
            position: relative;
            overflow: hidden;
        }
        
        .card-image::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(to bottom, transparent 60%, rgba(0, 0, 0, 0.7));
            z-index: 1;
        }
        
        .price-tag {
            position: absolute;
            top: 20px;
            right: 20px;
            background: #ffd166;
            color: #333;
            padding: 8px 18px;
            border-radius: 30px;
            font-weight: bold;
            font-size: 1.1rem;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
            z-index: 2;
            border: 2px solid rgba(255, 255, 255, 0.3);
        }
        
        .card-content {
            padding: 25px;
            position: relative;
            z-index: 1;
        }
        
        .card-title {
            font-size: 1.5rem;
            margin-bottom: 12px;
            color: #ffd166;
            font-weight: 600;
            position: relative;
            display: inline-block;
        }
        
        .card-title::after {
            content: "";
            position: absolute;
            bottom: -5px;
            left: 0;
            width: 50px;
            height: 2px;
            background: #9acd32;
        }
        
        .card-description {
            color: #d0d0d0;
            margin-bottom: 20px;
            font-size: 0.95rem;
            line-height: 1.6;
            font-weight: 300;
        }
        
        .card-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }
        
        .tag {
            background: rgba(255, 255, 255, 0.1);
            color: #f0f0f0;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 500;
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s ease;
        }
        
        .tag:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
        }
        
        .vegetarian {
            color: #4caf50;
            border-color: rgba(76, 175, 80, 0.3);
        }
        
        .spicy {
            color: #ffd166;
            border-color: rgba(255, 209, 102, 0.3);
        }
        
        .popular {
            background: #9acd32;
            color: #333;
            border-color: #9acd32;
        }
        
        .no-results {
            text-align: center;
            padding: 60px 20px;
            font-size: 1.3rem;
            color: #aaa;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            margin: 20px 0;
            border: 1px dashed rgba(255, 255, 255, 0.1);
        }
        
        .no-results i {
            font-size: 3rem;
            margin-bottom: 20px;
            color: #9acd32;
            display: block;
        }
        
        footer {
            text-align: center;
            padding: 40px 0;
            margin-top: 60px;
            color: #888;
            font-size: 0.9rem;
            background: rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .footer-logo {
            font-size: 1.8rem;
            color: #ffd166;
            margin-bottom: 15px;
            font-family: 'Playfair Display', serif;
        }
        
        .contact-info {
            margin-top: 20px;
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 20px;
        }
        
        .contact-item {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 15px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 30px;
            transition: all 0.3s ease;
        }
        
        .contact-item:hover {
            background: rgba(76, 175, 80, 0.2);
            transform: translateY(-3px);
        }
        
        .contact-info i {
            color: #4caf50;
            font-size: 1.1rem;
        }
        
        .social-links {
            margin-top: 20px;
            display: flex;
            justify-content: center;
            gap: 15px;
        }
        
        .social-links a {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 40px;
            height: 40px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 50%;
            color: #f0f0f0;
            transition: all 0.3s ease;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .social-links a:hover {
            background: #4caf50;
            transform: translateY(-5px);
            box-shadow: 0 5px 15px rgba(76, 175, 80, 0.4);
        }
        
        @media (max-width: 768px) {
            .logo {
                font-size: 2.8rem;
            }
            
            .tagline {
                font-size: 1.1rem;
            }
            
            .menu-grid {
                grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
                gap: 20px;
            }
            
            .card-image {
                height: 180px;
            }
            
            .contact-info {
                flex-direction: column;
                align-items: center;
            }
        }
        
        /* Animation for menu cards */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .menu-card {
            animation: fadeInUp 0.6s ease forwards;
            opacity: 0;
        }
        
        .menu-card:nth-child(1) { animation-delay: 0.1s; }
        .menu-card:nth-child(2) { animation-delay: 0.2s; }
        .menu-card:nth-child(3) { animation-delay: 0.3s; }
        .menu-card:nth-child(4) { animation-delay: 0.4s; }
        .menu-card:nth-child(5) { animation-delay: 0.5s; }
        .menu-card:nth-child(6) { animation-delay: 0.6s; }
        .menu-card:nth-child(7) { animation-delay: 0.7s; }
        .menu-card:nth-child(8) { animation-delay: 0.8s; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="logo"><i class="fas fa-utensils"></i> Anandham</div>
            <div class="tagline">Authentic South Indian Cuisine</div>

        <div class="menu-controls">
            <div class="search-container">

                <button class="search-btn" id="search-btn"><i class="fas fa-search"></i></button>
            </div>
            
            <div class="filter-buttons" id="filter-buttons">
                <!-- Filter buttons will be dynamically inserted here -->
            </div>
        </div>
        
        <div class="menu-grid" id="menu-grid">
            <!-- Menu items will be dynamically inserted here -->
        </div>
        
        <footer>

                <div class="contact-item">

            <div class="social-links">
                <a href="#"><i class="fab fa-facebook-f"></i></a>

                <a href="#"><i class="fab fa-twitter"></i></a>
                <a href="#"><i class="fab fa-youtube"></i></a>
            </div>
        </footer>
    </div>

    <script>
        // Sample menu data (replace with your actual menu items)
        const menuItems = [
            {

                description: "Crispy rice crepe filled with spiced potatoes, served with coconut chutney and sambar",

                tags: ["vegetarian", "popular"]
            },
            {
                id: 2,

                price: 280,

                image: "https://images.unsplash.com/photo-1589302168068-9646647a6f24?auto=format&fit=crop&w=600",
                tags: ["spicy", "popular"]
            },
            {
                id: 3,
                name: "Paneer Tikka",
                description: "Marinated cottage cheese cubes grilled in tandoor with spices and herbs",
                price: 220,
                category: "appetizers",
                image: "https://images.unsplash.com/photo-1565299624946-b28f40a0ca4b?auto=format&fit=crop&w=600",

            },
            {

                image: "https://images.unsplash.com/photo-1621263764928-df1444c5e829?auto=format&fit=crop&w=600",

            },
            {
                id: 5,

                price: 60,
                category: "beverages",
                image: "https://images.unsplash.com/photo-1559056199-641a0ac8b55e?auto=format&fit=crop&w=600",
                tags: []
            },
            {
                id: 6,
                name: "Hyderabadi Biryani",
                description: "Legendary dum biryani with basmati rice, goat meat, and secret spices",
                price: 350,
                category: "biryani",
                image: "https://images.unsplash.com/photo-1563379091339-03b21ab4a4f8?auto=format&fit=crop&w=600",
                tags: ["spicy"]
            },
            {
                id: 7,
                name: "Sambar Vada",
                description: "Crispy lentil donuts served in flavorful lentil soup",
                price: 110,
                category: "appetizers",
                image: "https://images.unsplash.com/photo-1603133872878-684f208fb84b?auto=format&fit=crop&w=600",
                tags: ["vegetarian"]
            },
            {
                id: 8,
                name: "Payasam",
                description: "Creamy rice pudding with nuts, cardamom, and saffron",
                price: 100,
                category: "desserts",
                image: "https://images.unsplash.com/photo-1622597467836-f3c7ca3b4c25?auto=format&fit=crop&w=600",
                tags: ["vegetarian"]
            }
        ];

        // Function to generate filter buttons dynamically
        function generateFilterButtons() {
            const filterButtonsContainer = document.getElementById('filter-buttons');
            filterButtonsContainer.innerHTML = '';
            
            // Get unique categories from menu items
            const categories = [...new Set(menuItems.map(item => item.category))];
            
            // Add "All Items" button first
            const allButton = document.createElement('button');
            allButton.className = 'filter-btn active';
            allButton.dataset.filter = 'all';
            allButton.textContent = 'All Items';
            filterButtonsContainer.appendChild(allButton);
            
            // Add buttons for each category
            categories.forEach(category => {
                const button = document.createElement('button');
                button.className = 'filter-btn';
                button.dataset.filter = category;
                
                // Capitalize first letter of category
                const formattedCategory = category.charAt(0).toUpperCase() + category.slice(1);
                button.textContent = formattedCategory;
                
                filterButtonsContainer.appendChild(button);
            });
            
            // Add event listeners to the new buttons
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    // Update active button
                    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    
                    filterMenu();
                });
            });
        }

        // Function to render menu items
        function renderMenu(items) {
            const menuGrid = document.getElementById('menu-grid');
            menuGrid.innerHTML = '';
            
            if (items.length === 0) {
                menuGrid.innerHTML = `
                    <div class="no-results">
                        <i class="fas fa-search"></i>
                        No dishes found. Try a different search term.
                    </div>
                `;
                return;
            }
            
            items.forEach((item, index) => {
                const card = document.createElement('div');
                card.className = 'menu-card';
                card.dataset.category = item.category;
                card.style.animationDelay = `${index * 0.1}s`;
                
                card.innerHTML = `
                    <div class="card-image" style="background-image: url('${item.image}')">
                        <div class="price-tag">₹${item.price}</div>
                    </div>
                    <div class="card-content">
                        <h3 class="card-title">${item.name}</h3>
                        <p class="card-description">${item.description}</p>
                        <div class="card-tags">
                            ${item.tags.map(tag => `<span class="tag ${tag}">${tag}</span>`).join('')}
                        </div>
                    </div>
                `;
                
                menuGrid.appendChild(card);
            });
        }

        // Function to filter menu items
        function filterMenu() {
            const searchTerm = document.getElementById('search-input').value.toLowerCase();
            const activeFilter = document.querySelector('.filter-btn.active').dataset.filter;
            
            let filteredItems = menuItems;
            
            // Apply category filter
            if (activeFilter !== 'all') {
                filteredItems = filteredItems.filter(item => item.category === activeFilter);
            }
            
            // Apply search filter
            if (searchTerm) {
                filteredItems = filteredItems.filter(item => 
                    item.name.toLowerCase().includes(searchTerm) || 
                    item.description.toLowerCase().includes(searchTerm)
                );
            }
            
            renderMenu(filteredItems);
        }

        // Search functionality
        document.getElementById('search-btn').addEventListener('click', filterMenu);
        document.getElementById('search-input').addEventListener('keyup', (event) => {
            if (event.key === 'Enter') {
                filterMenu();
            }
        });

        // Initialize the menu
        function initMenu() {
            generateFilterButtons();
            renderMenu(menuItems);
        }

        // Start the application
        initMenu();
    </script>
</body>
</html>
