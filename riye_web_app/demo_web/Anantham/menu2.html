<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anandham Restaurant - Digital Menu</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: linear-gradient(135deg, #1a3a1a 0%, #2d4a2d 50%, #1a3a1a 100%);
            background-attachment: fixed;
            color: #f0f0f0;
            line-height: 1.6;
            font-family: 'Poppins', sans-serif;
            min-height: 100vh;
            position: relative;
        }
        
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: url('https://images.unsplash.com/photo-1517248135467-4c7edcad34c4?auto=format&fit=crop&w=2000&q=80') center/cover;
            opacity: 0.05;
            z-index: -1;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
            position: relative;
            z-index: 1;
        }
        
        header {
            text-align: center;
            padding: 40px 0;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            margin-bottom: 30px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }
        
        .logo {
            font-size: 4rem;
            color: #ffd166;
            margin-bottom: 10px;
            text-shadow: 3px 3px 6px rgba(0, 0, 0, 0.5);
            font-family: 'Playfair Display', serif;
            letter-spacing: 2px;
            position: relative;
            display: inline-block;
        }
        
        .logo::after {
            content: "";
            position: absolute;
            bottom: -10px;
            left: 50%;
            transform: translateX(-50%);
            width: 80%;
            height: 3px;
            background: linear-gradient(90deg, transparent, #9acd32, transparent);
        }
        
        .tagline {
            font-size: 1.3rem;
            color: #9acd32;
            font-style: italic;
            font-weight: 300;
            margin-top: 15px;
            letter-spacing: 1px;
        }
        
        .menu-controls {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            margin-bottom: 40px;
        }
        
        .search-filter-container {
            display: flex;
            width: 100%;
            max-width: 900px;
            gap: 15px;
            flex-wrap: wrap;
            justify-content: center;
        }
        
        .search-container {
            display: flex;
            flex: 1;
            min-width: 300px;
            position: relative;
        }
        
        .search-input {
            flex: 1;
            padding: 15px 25px;
            border: 2px solid rgba(154, 205, 50, 0.3);
            border-radius: 50px 0 0 50px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(5px);
            color: #f0f0f0;
            font-size: 1rem;
            outline: none;
            transition: all 0.3s ease;
            font-weight: 500;
        }
        
        .search-input:focus {
            border-color: #9acd32;
            box-shadow: 0 0 0 3px rgba(154, 205, 50, 0.2);
        }
        
        .search-input::placeholder {
            color: #aaa;
            font-style: italic;
        }
        
        .search-btn {
            background: #4caf50;
            color: white;
            border: none;
            padding: 15px 25px;
            border-radius: 0 50px 50px 0;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s ease;
            font-size: 1.1rem;
            box-shadow: 0 4px 10px rgba(76, 175, 80, 0.3);
        }
        
        .search-btn:hover {
            background: #9acd32;
            transform: translateY(-2px);
            box-shadow: 0 6px 15px rgba(154, 205, 50, 0.4);
        }
        
        .filter-dropdown {
            position: relative;
        }
        
        .filter-dropdown-btn {
            background: rgba(76, 175, 80, 0.8);
            color: white;
            border: 2px solid rgba(76, 175, 80, 0.5);
            padding: 15px 20px;
            border-radius: 50px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
            font-size: 1rem;
            display: flex;
            align-items: center;
            gap: 8px;
            min-width: 160px;
            justify-content: space-between;
        }
        
        .filter-dropdown-btn:hover {
            background: #9acd32;
            border-color: #9acd32;
            transform: translateY(-2px);
            box-shadow: 0 6px 15px rgba(154, 205, 50, 0.4);
        }
        
        .filter-dropdown-menu {
            position: absolute;
            top: 100%;
            left: 0;
            width: 100%;
            background: rgba(26, 58, 26, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            margin-top: 10px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
            z-index: 10;
            opacity: 0;
            visibility: hidden;
            transform: translateY(-10px);
            transition: all 0.3s ease;
        }
        
        .filter-dropdown-menu.active {
            opacity: 1;
            visibility: visible;
            transform: translateY(0);
        }
        
        .filter-option {
            padding: 12px 20px;
            cursor: pointer;
            transition: all 0.2s ease;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .filter-option:last-child {
            border-bottom: none;
        }
        
        .filter-option:hover {
            background: rgba(154, 205, 50, 0.2);
        }
        
        .filter-option.active {
            background: rgba(154, 205, 50, 0.3);
            color: #ffd166;
            font-weight: 600;
        }
        
        .filter-icon {
            width: 20px;
            text-align: center;
        }
        
        .filter-buttons-container {
            width: 100%;
            max-width: 1000px;
            position: relative;
        }
        
        .filter-buttons {
            display: flex;
            gap: 15px;
            overflow-x: auto;
            padding: 10px 0;
            scrollbar-width: thin;
            scrollbar-color: #9acd32 #2d4a2d;
        }
        
        .filter-buttons::-webkit-scrollbar {
            height: 8px;
        }
        
        .filter-buttons::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
        }
        
        .filter-buttons::-webkit-scrollbar-thumb {
            background: #9acd32;
            border-radius: 10px;
        }
        
        .filter-buttons::-webkit-scrollbar-thumb:hover {
            background: #ffd166;
        }
        
        .filter-btn {
            background: rgba(76, 175, 80, 0.8);
            color: white;
            border: 2px solid transparent;
            padding: 12px 25px;
            border-radius: 50px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
            font-size: 1rem;
            position: relative;
            overflow: hidden;
            z-index: 1;
            white-space: nowrap;
            flex-shrink: 0;
        }
        
        .filter-btn::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 0;
            height: 100%;
            background: #9acd32;
            transition: width 0.3s ease;
            z-index: -1;
        }
        
        .filter-btn:hover::before, .filter-btn.active::before {
            width: 100%;
        }
        
        .filter-btn:hover, .filter-btn.active {
            color: #333;
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(154, 205, 50, 0.4);
        }
        
        .scroll-indicator {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            width: 40px;
            height: 40px;
            background: rgba(76, 175, 80, 0.8);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 5;
            transition: all 0.3s ease;
            opacity: 0;
            pointer-events: none;
        }
        
        .scroll-indicator.show {
            opacity: 1;
            pointer-events: all;
        }
        
        .scroll-indicator:hover {
            background: #9acd32;
            transform: translateY(-50%) scale(1.1);
        }
        
        .scroll-left {
            left: -20px;
        }
        
        .scroll-right {
            right: -20px;
        }
        
        .menu-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 30px;
        }
        
        .menu-card {
            position: relative;
            height: 400px;
            border-radius: 20px;
            overflow: hidden;
            transition: all 0.4s ease;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            cursor: pointer;
        }
        
        .menu-card::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(to bottom, 
                rgba(0, 0, 0, 0.2) 0%, 
                rgba(0, 0, 0, 0.4) 50%, 
                rgba(0, 0, 0, 0.8) 100%);
            z-index: 1;
            transition: all 0.4s ease;
        }
        
        .menu-card:hover::before {
            background: linear-gradient(to bottom, 
                rgba(0, 0, 0, 0.1) 0%, 
                rgba(0, 0, 0, 0.3) 50%, 
                rgba(0, 0, 0, 0.7) 100%);
        }
        
        .menu-card:hover {
            transform: translateY(-12px);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
        }
        
        .card-background {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-size: cover;
            background-position: center;
            transition: transform 0.8s ease;
        }
        
        .menu-card:hover .card-background {
            transform: scale(1.1);
        }
        
        .price-tag {
            position: absolute;
            top: 20px;
            right: 20px;
            background: #ffd166;
            color: #333;
            padding: 8px 18px;
            border-radius: 30px;
            font-weight: bold;
            font-size: 1.1rem;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
            z-index: 2;
            border: 2px solid rgba(255, 255, 255, 0.3);
        }
        
        .card-content {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            padding: 30px 25px;
            z-index: 2;
            transition: all 0.4s ease;
        }
        
        .menu-card:hover .card-content {
            padding-bottom: 35px;
        }
        
        .card-title {
            font-size: 1.8rem;
            margin-bottom: 12px;
            color: #ffd166;
            font-weight: 600;
            position: relative;
            display: inline-block;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.5);
        }
        
        .card-title::after {
            content: "";
            position: absolute;
            bottom: -5px;
            left: 0;
            width: 60px;
            height: 3px;
            background: #9acd32;
        }
        
        .card-description {
            color: #f0f0f0;
            margin-bottom: 20px;
            font-size: 0.95rem;
            line-height: 1.6;
            font-weight: 300;
            text-shadow: 0 1px 2px rgba(0, 0, 0, 0.5);
            max-height: 0;
            overflow: hidden;
            opacity: 0;
            transition: all 0.4s ease;
        }
        
        .menu-card:hover .card-description {
            max-height: 100px;
            opacity: 1;
            margin-bottom: 15px;
        }
        
        .card-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }
        
        .tag {
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(5px);
            color: #f0f0f0;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 500;
            border: 1px solid rgba(255, 255, 255, 0.2);
            transition: all 0.3s ease;
            text-shadow: 0 1px 2px rgba(0, 0, 0, 0.5);
        }
        
        .tag:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.3);
            background: rgba(255, 255, 255, 0.3);
        }
        
        .vegetarian {
            color: #4caf50;
            border-color: rgba(76, 175, 80, 0.5);
        }
        
        .spicy {
            color: #ffd166;
            border-color: rgba(255, 209, 102, 0.5);
        }
        
        .popular {
            background: #9acd32;
            color: #333;
            border-color: #9acd32;
            text-shadow: none;
        }
        
        .no-results {
            text-align: center;
            padding: 60px 20px;
            font-size: 1.3rem;
            color: #aaa;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            margin: 20px 0;
            border: 1px dashed rgba(255, 255, 255, 0.1);
        }
        
        .no-results i {
            font-size: 3rem;
            margin-bottom: 20px;
            color: #9acd32;
            display: block;
        }
        
        footer {
            text-align: center;
            padding: 40px 0;
            margin-top: 60px;
            color: #888;
            font-size: 0.9rem;
            background: rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .footer-logo {
            font-size: 1.8rem;
            color: #ffd166;
            margin-bottom: 15px;
            font-family: 'Playfair Display', serif;
        }
        
        .contact-info {
            margin-top: 20px;
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 20px;
        }
        
        .contact-item {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 15px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 30px;
            transition: all 0.3s ease;
        }
        
        .contact-item:hover {
            background: rgba(76, 175, 80, 0.2);
            transform: translateY(-3px);
        }
        
        .contact-info i {
            color: #4caf50;
            font-size: 1.1rem;
        }
        
        .social-links {
            margin-top: 20px;
            display: flex;
            justify-content: center;
            gap: 15px;
        }
        
        .social-links a {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 40px;
            height: 40px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 50%;
            color: #f0f0f0;
            transition: all 0.3s ease;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .social-links a:hover {
            background: #4caf50;
            transform: translateY(-5px);
            box-shadow: 0 5px 15px rgba(76, 175, 80, 0.4);
        }
        
        @media (max-width: 768px) {
            .logo {
                font-size: 2.8rem;
            }
            
            .tagline {
                font-size: 1.1rem;
            }
            
            .search-filter-container {
                flex-direction: column;
                align-items: center;
            }
            
            .search-container {
                min-width: 280px;
            }
            
            .filter-dropdown-btn {
                min-width: 280px;
            }
            
            .filter-buttons-container {
                max-width: 100%;
            }
            
            .filter-buttons {
                padding: 10px 20px;
            }
            
            .scroll-indicator {
                display: none;
            }
            
            .menu-grid {
                grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
                gap: 20px;
            }
            
            .menu-card {
                height: 350px;
            }
            
            .card-title {
                font-size: 1.5rem;
            }
            
            .contact-info {
                flex-direction: column;
                align-items: center;
            }
        }
        
        /* Animation for menu cards */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .menu-card {
            animation: fadeInUp 0.6s ease forwards;
            opacity: 0;
        }
        
        .menu-card:nth-child(1) { animation-delay: 0.1s; }
        .menu-card:nth-child(2) { animation-delay: 0.2s; }
        .menu-card:nth-child(3) { animation-delay: 0.3s; }
        .menu-card:nth-child(4) { animation-delay: 0.4s; }
        .menu-card:nth-child(5) { animation-delay: 0.5s; }
        .menu-card:nth-child(6) { animation-delay: 0.6s; }
        .menu-card:nth-child(7) { animation-delay: 0.7s; }
        .menu-card:nth-child(8) { animation-delay: 0.8s; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="logo"><i class="fas fa-utensils"></i> Anandham</div>
            <div class="tagline">Authentic South Indian Cuisine</div>
        </header>
        
        <div class="menu-controls">
            <div class="search-filter-container">
                <div class="search-container">
                    <input type="text" class="search-input" id="search-input" placeholder="Search by dish name...">
                    <button class="search-btn" id="search-btn"><i class="fas fa-search"></i></button>
                </div>
                
                <div class="filter-dropdown" id="diet-filter-container">
                    <button class="filter-dropdown-btn" id="diet-filter-btn">
                        <span id="diet-filter-text">All Diets</span>
                        <i class="fas fa-chevron-down"></i>
                    </button>
                    <div class="filter-dropdown-menu" id="diet-filter-dropdown">
                        <div class="filter-option active" data-diet="all">
                            <span class="filter-icon"><i class="fas fa-utensils"></i></span>
                            <span>All Diets</span>
                        </div>
                        <div class="filter-option" data-diet="veg">
                            <span class="filter-icon"><i class="fas fa-leaf"></i></span>
                            <span>Vegetarian</span>
                        </div>
                        <div class="filter-option" data-diet="non-veg">
                            <span class="filter-icon"><i class="fas fa-drumstick-bite"></i></span>
                            <span>Non-Vegetarian</span>
                        </div>
                        <div class="filter-option" data-diet="egg">
                            <span class="filter-icon"><i class="fas fa-egg"></i></span>
                            <span>Egg</span>
                        </div>
                        <div class="filter-option" data-diet="jain">
                            <span class="filter-icon"><i class="fas fa-seedling"></i></span>
                            <span>Jain</span>
                        </div>
                    </div>
                </div>
                
                <div class="filter-dropdown" id="timing-filter-container">
                    <button class="filter-dropdown-btn" id="timing-filter-btn">
                        <span id="timing-filter-text">All Day</span>
                        <i class="fas fa-chevron-down"></i>
                    </button>
                    <div class="filter-dropdown-menu" id="timing-filter-dropdown">
                        <div class="filter-option active" data-timing="all">
                            <span class="filter-icon"><i class="fas fa-clock"></i></span>
                            <span>All Day</span>
                        </div>
                        <div class="filter-option" data-timing="breakfast">
                            <span class="filter-icon"><i class="fas fa-sun"></i></span>
                            <span>Breakfast</span>
                        </div>
                        <div class="filter-option" data-timing="lunch">
                            <span class="filter-icon"><i class="fas fa-cloud-sun"></i></span>
                            <span>Lunch</span>
                        </div>
                        <div class="filter-option" data-timing="dinner">
                            <span class="filter-icon"><i class="fas fa-moon"></i></span>
                            <span>Dinner</span>
                        </div>
                        <div class="filter-option" data-timing="brunch">
                            <span class="filter-icon"><i class="fas fa-coffee"></i></span>
                            <span>Brunch</span>
                        </div>
                        <div class="filter-option" data-timing="snacks">
                            <span class="filter-icon"><i class="fas fa-cookie-bite"></i></span>
                            <span>Snacks</span>
                        </div>
                    </div>
                </div>
            </div>
            
            <div class="filter-buttons-container">
                <div class="scroll-indicator scroll-left" id="scroll-left">
                    <i class="fas fa-chevron-left"></i>
                </div>
                <div class="filter-buttons" id="filter-buttons">
                    <!-- Filter buttons will be dynamically inserted here -->
                </div>
                <div class="scroll-indicator scroll-right" id="scroll-right">
                    <i class="fas fa-chevron-right"></i>
                </div>
            </div>
        </div>
        
        <div class="menu-grid" id="menu-grid">
            <!-- Menu items will be dynamically inserted here -->
        </div>
        
        <footer>
            <div class="footer-logo"><i class="fas fa-utensils"></i> Anandham</div>
            <div>© 2023 Anandham Restaurant. All rights reserved.</div>
            <div class="contact-info">
                <div class="contact-item">
                    <i class="fas fa-map-marker-alt"></i>
                    <span>123 Food Street, Chennai, India</span>
                </div>
                <div class="contact-item">
                    <i class="fas fa-phone"></i>
                    <span>+91 98765 43210</span>
                </div>
                <div class="contact-item">
                    <i class="fas fa-envelope"></i>
                    <span>info@anandham.com</span>
                </div>
            </div>
            <div class="social-links">
                <a href="#"><i class="fab fa-facebook-f"></i></a>
                <a href="#"><i class="fab fa-instagram"></i></a>
                <a href="#"><i class="fab fa-twitter"></i></a>
                <a href="#"><i class="fab fa-youtube"></i></a>
            </div>
        </footer>
    </div>

        // Function to generate filter buttons dynamically
        function generateFilterButtons() {
            const filterButtonsContainer = document.getElementById('filter-buttons');
            filterButtonsContainer.innerHTML = '';
            
            // Get unique categories from menu items
            const categories = [...new Set(menuItems.map(item => item.category))];
            
            // Add "All Items" button first
            const allButton = document.createElement('button');
            allButton.className = 'filter-btn active';
            allButton.dataset.filter = 'all';
            allButton.textContent = 'All Items';
            filterButtonsContainer.appendChild(allButton);
            
            // Add buttons for each category
            categories.forEach(category => {
                const button = document.createElement('button');
                button.className = 'filter-btn';
                button.dataset.filter = category;
                
                // Capitalize first letter of category
                const formattedCategory = category.charAt(0).toUpperCase() + category.slice(1);
                button.textContent = formattedCategory;
                
                filterButtonsContainer.appendChild(button);
            });
            
            // Add event listeners to the new buttons
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    // Update active button
                    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    
                    // Clear search input when category filter is selected
                    document.getElementById('search-input').value = '';
                    
                    filterMenu();
                });
            });
            
            // Check if scrolling is needed and show/hide scroll indicators
            updateScrollIndicators();
        }

        // Function to update scroll indicators
        function updateScrollIndicators() {
            const filterButtons = document.getElementById('filter-buttons');
            const scrollLeft = document.getElementById('scroll-left');
            const scrollRight = document.getElementById('scroll-right');
            
            if (filterButtons.scrollWidth > filterButtons.clientWidth) {
                scrollLeft.classList.add('show');
                scrollRight.classList.add('show');
            } else {
                scrollLeft.classList.remove('show');
                scrollRight.classList.remove('show');
            }
        }

        // Function to render menu items
        function renderMenu(items) {
            const menuGrid = document.getElementById('menu-grid');
            menuGrid.innerHTML = '';
            
            if (items.length === 0) {
                menuGrid.innerHTML = `
                    <div class="no-results">
                        <i class="fas fa-search"></i>
                        No dishes found. Try a different search term or filter.
                    </div>
                `;
                return;
            }
            
            items.forEach((item, index) => {
                const card = document.createElement('div');
                card.className = 'menu-card';
                card.dataset.category = item.category;
                card.dataset.diet = item.diet;
                card.dataset.timing = item.timing;
                card.style.animationDelay = `${index * 0.1}s`;
                
                card.innerHTML = `
                    <div class="card-background" style="background-image: url('${item.image}')"></div>
                    <div class="price-tag">₹${item.price}</div>
                    <div class="card-content">
                        <h3 class="card-title">${item.name}</h3>
                        <p class="card-description">${item.description}</p>
                        <div class="card-tags">
                            ${item.tags.map(tag => `<span class="tag ${tag}">${tag}</span>`).join('')}
                        </div>
                    </div>
                `;
                
                menuGrid.appendChild(card);
            });
        }

        // Function to filter menu items
        function filterMenu() {
            const searchTerm = document.getElementById('search-input').value.toLowerCase();
            const activeFilter = document.querySelector('.filter-btn.active').dataset.filter;
            const activeDietFilter = document.querySelector('#diet-filter-dropdown .filter-option.active').dataset.diet;
            const activeTimingFilter = document.querySelector('#timing-filter-dropdown .filter-option.active').dataset.timing;
            
            // Start with all menu items
            let filteredItems = [...menuItems];
            
            // Apply search filter if there's a search term (only search by name)
            if (searchTerm) {
                filteredItems = filteredItems.filter(item => 
                    item.name.toLowerCase().includes(searchTerm)
                );
            }
            
            // Apply dietary filter if not "all"
            if (activeDietFilter !== 'all') {
                filteredItems = filteredItems.filter(item => item.diet === activeDietFilter);
            }
            
            // Apply timing filter if not "all"
            if (activeTimingFilter !== 'all') {
                filteredItems = filteredItems.filter(item => item.timing === activeTimingFilter);
            }
            
            // Apply category filter if not "all"
            if (activeFilter !== 'all') {
                filteredItems = filteredItems.filter(item => item.category === activeFilter);
            }
            
            renderMenu(filteredItems);
        }

        // Dietary filter dropdown functionality
        document.getElementById('diet-filter-btn').addEventListener('click', () => {
            const dropdown = document.getElementById('diet-filter-dropdown');
            dropdown.classList.toggle('active');
            
            // Close timing dropdown if open
            document.getElementById('timing-filter-dropdown').classList.remove('active');
        });

        // Timing filter dropdown functionality
        document.getElementById('timing-filter-btn').addEventListener('click', () => {
            const dropdown = document.getElementById('timing-filter-dropdown');
            dropdown.classList.toggle('active');
            
            // Close diet dropdown if open
            document.getElementById('diet-filter-dropdown').classList.remove('active');
        });

        // Close dropdowns when clicking outside
        document.addEventListener('click', (event) => {
            const dietFilterContainer = document.getElementById('diet-filter-container');
            const timingFilterContainer = document.getElementById('timing-filter-container');
            
            if (!dietFilterContainer.contains(event.target)) {
                document.getElementById('diet-filter-dropdown').classList.remove('active');
            }
            
            if (!timingFilterContainer.contains(event.target)) {
                document.getElementById('timing-filter-dropdown').classList.remove('active');
            }
        });

        // Dietary filter option selection
        document.querySelectorAll('#diet-filter-dropdown .filter-option').forEach(option => {
            option.addEventListener('click', () => {
                // Update active option
                document.querySelectorAll('#diet-filter-dropdown .filter-option').forEach(opt => opt.classList.remove('active'));
                option.classList.add('active');
                
                // Update button text
                const selectedDiet = option.querySelector('span:last-child').textContent;
                document.getElementById('diet-filter-text').textContent = selectedDiet;
                
                // Clear search input when dietary filter is selected
                document.getElementById('search-input').value = '';
                
                // Close dropdown
                document.getElementById('diet-filter-dropdown').classList.remove('active');
                
                // Apply filters
                filterMenu();
            });
        });

        // Timing filter option selection
        document.querySelectorAll('#timing-filter-dropdown .filter-option').forEach(option => {
            option.addEventListener('click', () => {
                // Update active option
                document.querySelectorAll('#timing-filter-dropdown .filter-option').forEach(opt => opt.classList.remove('active'));
                option.classList.add('active');
                
                // Update button text
                const selectedTiming = option.querySelector('span:last-child').textContent;
                document.getElementById('timing-filter-text').textContent = selectedTiming;
                
                // Clear search input when timing filter is selected
                document.getElementById('search-input').value = '';
                
                // Close dropdown
                document.getElementById('timing-filter-dropdown').classList.remove('active');
                
                // Apply filters
                filterMenu();
            });
        });

        // Scroll functionality for filter buttons
        document.getElementById('scroll-left').addEventListener('click', () => {
            const filterButtons = document.getElementById('filter-buttons');
            filterButtons.scrollBy({
                left: -200,
                behavior: 'smooth'
            });
        });

        document.getElementById('scroll-right').addEventListener('click', () => {
            const filterButtons = document.getElementById('filter-buttons');
            filterButtons.scrollBy({
                left: 200,
                behavior: 'smooth'
            });
        });

        // Update scroll indicators on scroll
        document.getElementById('filter-buttons').addEventListener('scroll', () => {
            const filterButtons = document.getElementById('filter-buttons');
            const scrollLeft = document.getElementById('scroll-left');
            const scrollRight = document.getElementById('scroll-right');
            
            // Hide left indicator if at the beginning
            if (filterButtons.scrollLeft <= 0) {
                scrollLeft.classList.remove('show');
            } else {
                scrollLeft.classList.add('show');
            }
            
            // Hide right indicator if at the end
            if (filterButtons.scrollLeft >= filterButtons.scrollWidth - filterButtons.clientWidth) {
                scrollRight.classList.remove('show');
            } else {
                scrollRight.classList.add('show');
            }
        });

        // Search functionality
        document.getElementById('search-btn').addEventListener('click', filterMenu);
        document.getElementById('search-input').addEventListener('keyup', (event) => {
            if (event.key === 'Enter') {
                filterMenu();
            }
        });

        // Initialize the menu
        function initMenu() {
            generateFilterButtons();
            renderMenu(menuItems);
        }

        // Start the application
        initMenu();

        // Update scroll indicators on window resize
        window.addEventListener('resize', updateScrollIndicators);
    </script>
