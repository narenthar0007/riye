<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Site Attendance System</title>
    <style>
        :root {
            --primary-color: #f39c12; /* Construction Yellow */
            --dark-color: #2c3e50;
            --light-color: #ecf0f1;
            --success-color: #27ae60;
            --owner-color: #8e44ad;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f6f7;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            gap: 20px;
        }

        .attendance-card, .decoder-card {
            background: #ffffff;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 500px;
            padding: 25px;
            box-sizing: border-box;
        }

        .attendance-card { border-top: 6px solid var(--primary-color); }
        .decoder-card { border-top: 6px solid var(--owner-color); }

        h2 {
            text-align: center;
            color: var(--dark-color);
            margin-top: 0;
            margin-bottom: 20px;
            text-transform: uppercase;
            font-size: 1.3rem;
            letter-spacing: 1px;
        }

        .tab-container {
            display: flex;
            margin-bottom: 20px;
            border-radius: 6px;
            overflow: hidden;
            border: 1px solid #ccc;
        }

        .tab-btn {
            flex: 1;
            padding: 12px;
            background: var(--light-color);
            border: none;
            cursor: pointer;
            font-weight: bold;
            color: #666;
            transition: all 0.3s ease;
        }

        .tab-btn.active {
            background: var(--dark-color);
            color: #fff;
        }

        .form-group { margin-bottom: 15px; }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: var(--dark-color);
        }

        input[type="text"], select {
            width: 100%;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
            font-size: 16px;
        }

        /* Camera Section Styles */
        .camera-container {
            background: #000;
            border-radius: 6px;
            overflow: hidden;
            position: relative;
            margin-bottom: 15px;
            text-align: center;
            height: 200px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform: scaleX(-1); /* Mirror view for selfies */
        }

        .shift-badge {
            background: var(--dark-color);
            color: #fff;
            padding: 8px 12px;
            border-radius: 4px;
            display: inline-block;
            font-weight: bold;
            margin-bottom: 15px;
            font-size: 0.9rem;
        }

        .btn-submit {
            width: 100%;
            background-color: var(--success-color);
            color: white;
            padding: 14px;
            border: none;
            border-radius: 4px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .btn-decode {
            width: 100%;
            background-color: var(--owner-color);
            color: white;
            padding: 12px;
            border: none;
            border-radius: 4px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
        }

        .location-status {
            font-size: 0.85rem;
            color: #7f8c8d;
            margin-top: 8px;
            font-style: italic;
            text-align: center;
        }

        .decode-result {
            background: var(--light-color);
            padding: 12px;
            border-radius: 4px;
            margin-top: 15px;
            font-family: monospace;
            font-size: 0.95rem;
            color: #2c3e50;
            white-space: pre-wrap;
        }

        .hidden { display: none; }
    </style>
</head>
<body>

<div class="attendance-card">
    <h2>🏗️ Site Attendance Panel</h2>
    
    <label>Photo Verification (Selfie)</label>
    <div class="camera-container">
        <video id="video" autoplay playsinline muted></video>
    </div>

    <div id="shiftDisplay" class="shift-badge">Checking Shift Time...</div>

    <div class="tab-container">
        <button class="tab-btn active" onclick="switchTab('site-engg')">Site Engineer</button>
        <button class="tab-btn" onclick="switchTab('employee')">Employee / Worker</button>
    </div>

    <form id="attendanceForm" onsubmit="handleAttendance(event)">
        <div id="enggGroup" class="form-group">
            <label for="engineerName">Select Engineer Name</label>
            <select id="engineerName" onchange="updateShiftBadge()">
                <option value="" disabled selected>-- Choose Name --</option>
                <option value="Muralikrishna">Muralikrishna</option>
                <option value="Chelladurai">Chelladurai</option>
                <option value="Vinoth">Vinoth</option>
                <option value="Ganjayagandhi">Ganjayagandhi</option>
            </select>
        </div>

        <div id="employeeGroup" class="form-group hidden">
            <label for="employeeName">Enter Employee/Worker Name</label>
            <input type="text" id="employeeName" placeholder="Type full name..." oninput="updateShiftBadge()">
        </div>

        <input type="hidden" id="roleType" value="Site Engineer">

        <button type="submit" class="btn-submit">Submit & Open WhatsApp</button>
        <p id="statusMessage" class="location-status">Initializing system...</p>
    </form>
</div>

<div class="decoder-card">
    <h2>🔑 Owner Security Decoder</h2>
    <div class="form-group">
        <label for="secureCodeInput">Paste Verification Code Here</label>
        <input type="text" id="secureCodeInput" placeholder="Paste the code from WhatsApp text...">
    </div>
    <button type="button" class="btn-decode" onclick="decodeAttendanceToken()">Decode Attendance</button>
    <div id="decodeResult" class="decode-result hidden">Result details will display here...</div>
</div>

<script>
    const OWNER_PHONE_NUMBER = '919942223010'; 

    // Initialize Camera on page load
    window.addEventListener('DOMContentLoaded', () => {
        initCamera();
        updateShiftBadge();
        setInterval(updateShiftBadge, 60000); // Keep tracking time accurately
    });

    function initCamera() {
        const video = document.getElementById('video');
        if (navigator.mediaDevices && navigator.mediaDevices.getUserMedia) {
            navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" }, audio: false })
            .then(stream => {
                video.srcObject = stream;
            })
            .catch(err => {
                console.error("Camera access blocked: ", err);
                document.getElementById('statusMessage').innerText = "Camera access denied. Please grant permission.";
            });
        }
    }

    // Dynamic Automatic Determination: Morning vs Afternoon
    function getShiftDetails() {
        const now = new Date();
        const currentHour = now.getHours();
        const isPunchIn = currentHour < 13; // True if before 1:00 PM (13:00)
        return {
            type: isPunchIn ? "PUNCH IN" : "PUNCH OUT",
            codeFlag: isPunchIn ? "IN" : "OUT"
        };
    }

    function updateShiftBadge() {
        const shift = getShiftDetails();
        const badge = document.getElementById('shiftDisplay');
        badge.innerText = `Current Shift Status: ${shift.type}`;
        badge.style.backgroundColor = shift.type === "PUNCH IN" ? "#27ae60" : "#d35400";
    }

    function switchTab(role) {
        const enggGroup = document.getElementById('enggGroup');
        const employeeGroup = document.getElementById('employeeGroup');
        const roleTypeInput = document.getElementById('roleType');
        const tabs = document.querySelectorAll('.tab-btn');

        tabs.forEach(tab => tab.classList.remove('active'));

        if (role === 'site-engg') {
            tabs[0].classList.add('active');
            enggGroup.classList.remove('hidden');
            employeeGroup.classList.add('hidden');
            roleTypeInput.value = "Site Engineer";
        } else {
            tabs[1].classList.add('active');
            enggGroup.classList.add('hidden');
            employeeGroup.classList.remove('hidden');
            roleTypeInput.value = "Employee";
        }
        updateShiftBadge();
    }

    // Logic to compile the requested algorithmic string
    function generateSecureCode(name, dateObj, shiftFlag) {
        const year = dateObj.getFullYear();
        const month = String(dateObj.getMonth() + 1).padStart(2, '0');
        const dayNum = String(dateObj.getDate()).padStart(2, '0');
        
        const days = ['SUN', 'MON', 'TUE', 'WED', 'THU', 'FRI', 'SAT'];
        const dayName = days[dateObj.getDay()];
        
        // Clean up the name string to draw structural 3-character prefix safely
        const cleanName = name.replace(/[^a-zA-Z]/g, '').toUpperCase();
        const namePart = cleanName.padEnd(3, 'X').substring(0, 3);
        
        const hh = String(dateObj.getHours()).padStart(2, '0');
        const mm = String(dateObj.getMinutes()).padStart(2, '0');

        // Layout syntax pattern generation: DATE-DAY-NAME-TIME-SHIFTTYPE
        const simpleReadablePart = `${year}${month}${dayNum}-${dayName}-${namePart}-${hh}${mm}-${shiftFlag}`;
        
        // Simple obfuscation translation key algorithm mapping to prevent raw text modification
        return btoa(simpleReadablePart).replace(/=/g, ''); 
    }

    function handleAttendance(event) {
        event.preventDefault();
        
        const role = document.getElementById('roleType').value;
        let name = "";

        if (role === "Site Engineer") {
            name = document.getElementById('engineerName').value;
            if (!name) return alert("Please pick an Engineer Name.");
        } else {
            name = document.getElementById('employeeName').value.trim();
            if (!name) return alert("Please input an Employee Name.");
        }

        const statusText = document.getElementById('statusMessage');
        statusText.innerText = "Tracking location coordinates...";

        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(
                (position) => {
                    sendData(role, name, position.coords.latitude, position.coords.longitude);
                },
                () => {
                    statusText.innerText = "Location timeout. Submitting without GPS location coordinates...";
                    sendData(role, name, null, null);
                },
                { enableHighAccuracy: true, timeout: 15000, maximumAge: 60000 }
            );
        } else {
            sendData(role, name, null, null);
        }
    }

    function sendData(role, name, lat, lon) {
        const statusText = document.getElementById('statusMessage');
        const now = new Date();
        
        const dateStr = now.toLocaleDateString('en-IN', { dateStyle: 'long' });
        const timeStr = now.toLocaleTimeString('en-IN', { hour: '2-digit', minute: '2-digit', hour12: true });
        const shift = getShiftDetails();

        // Generate algorithmic verification data code string
        const uniqueSecurityToken = generateSecureCode(name, now, shift.codeFlag);

        let mapsUrl = "Unavailable (GPS Blocked)";
        if (lat && lon) {
            mapsUrl = `https://maps.google.com/?q=${lat},${lon}`;
        }

        const message = `*🚧  🚧*\n\n` +
                        `*Status:* ✅ ${shift.type}\n` +
                        `*Designation:* ${role}\n` +
                        `*Name:* ${name}\n` +
                        `*Date:* ${dateStr}\n` +
                        `*Time:* ${timeStr}\n` +
                        `*Location Tracker:* ${mapsUrl}\n\n` +
                        `*🔒 Verification Security Code:* \n\`${uniqueSecurityToken}\``;

        const whatsappUrl = `https://api.whatsapp.com/send?phone=${OWNER_PHONE_NUMBER}&text=${encodeURIComponent(message)}`;
        
        statusText.innerText = "Opening WhatsApp payload redirection...";
        window.open(whatsappUrl, '_blank');
    }

    // Owner Side Decoding Handler Interface
    function decodeAttendanceToken() {
        const codeInput = document.getElementById('secureCodeInput').value.trim();
        const resultBox = document.getElementById('decodeResult');
        
        if (!codeInput) {
            alert("Please paste a secure verification string code first.");
            return;
        }

        try {
            // Re-pad the Base64 padding structure string format dynamically if it was stripped
            let base64 = codeInput;
            while (base64.length % 4) { base64 += '='; }
            
            const decodedStr = atob(base64);
            const segments = decodedStr.split('-');
            
            if (segments.length !== 5) {
                throw new Error("Invalid format pattern structural mismatch.");
            }

            const rawDate = segments[0]; // YYYYMMDD
            const dayName = segments[1]; // DAY
            const namePart = segments[2]; // NAME PREFIX
            const rawTime = segments[3]; // HHMM
            const shiftType = segments[4] === "IN" ? "PUNCH IN (Morning)" : "PUNCH OUT (Afternoon)";

            // Format strings for reading display presentation clean
            const formattedDate = `${rawDate.substring(6,8)}/${rawDate.substring(4,6)}/${rawDate.substring(0,4)}`;
            const formattedTime = `${rawTime.substring(0,2)}:${rawTime.substring(2,4)}`;

            resultBox.innerText = `📋 VERIFIED RECORD FOUND:\n` +
                                  `---------------------------\n` +
                                  `• Worker Name Code: ${namePart}...\n` +
                                  `• Logged Event:     ${shiftType}\n` +
                                  `• Checked Date:     ${formattedDate} (${dayName})\n` +
                                  `• System Timestamp: ${formattedTime}`;
            
            resultBox.classList.remove('hidden');
        } catch (e) {
            alert("Failed to read token. Check if the string matches the output or was modified.");
            resultBox.classList.add('hidden');
        }
    }
</script>

</body>
</html>
